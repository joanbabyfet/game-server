syntax = "proto3";

package slot;

option go_package = "game-api/proto/slotpb;slotpb";

message SpinReq {
    string request_id = 1;
    string order_no = 2;
    string round_id = 3;

    uint64 uid = 4;
    uint32 agent_id = 5;
    uint32 game_id = 6;
    int64 bet_amount = 7;
    string currency = 8;

    bool debug_fail = 99; 
}

message SpinResp {
    string order_no = 1;

    int64 balance = 2;
    int64 win_amount = 3;
}